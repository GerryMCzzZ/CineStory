server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cinestory-backend

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/cinestory?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: cinestory123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms
      timeout: 5000ms

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  # Task Configuration
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: cinestory-task-

# Video Generation Configuration
video:
  generation:
    # Provider configurations
    providers:
      runway:
        enabled: true
        api-key: ${RUNWAY_API_KEY:}
        base-url: ${RUNWAY_BASE_URL:https://api.dev.runwayml.com/v1}
        max-concurrent: 3
        priority: 1
        max-retries: 3
        timeout: 600000
        max-duration: 18
      pika:
        enabled: true
        api-key: ${PIKA_API_KEY:}
        base-url: ${PIKA_BASE_URL:https://api.pika.art/v1}
        max-concurrent: 5
        priority: 2
        max-retries: 3
        timeout: 300000
        max-duration: 4
      luma:
        enabled: true
        api-key: ${LUMA_API_KEY:}
        base-url: ${LUMA_BASE_URL:https://api.lumalabs.ai}
        max-concurrent: 5
        priority: 3
        max-retries: 3
        timeout: 300000
        max-duration: 5

    # Default settings
    default-provider: runway
    default-aspect-ratio: "16:9"
    default-duration: 5
    poll-interval: 5000

# LLM Configuration
llm:
  provider: openai
  api-key: ${LLM_API_KEY:}
  model: gpt-4
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  timeout: 120000
  max-retries: 3

# Text Splitting Configuration
text:
  splitting:
    max-slice-length: 500
    min-slice-length: 50
    context-overlap: 100
    preserve-dialogue: true

# FFmpeg Configuration
ffmpeg:
  path: ${FFMPEG_PATH:ffmpeg}
  temp-dir: ${java.io.tmpdir}/cinestory/ffmpeg
  output-dir: ${user.home}/cinestory/output

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: cinestory
  connect-timeout: 10000
  write-timeout: 60000
  read-timeout: 10000

# WebSocket Configuration
websocket:
  allowed-origins: "*"

# File Upload Configuration
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./storage/uploads}
    max-size: ${FILE_MAX_SIZE:52428800}

# Logging Configuration
logging:
  level:
    root: INFO
    com.cinestory: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cinestory.log
    max-size: 100MB
    max-history: 30

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /api/actuator
    health:
      show-details: always

# SpringDoc OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
  redis:
    host: ${SPRING_DATA_REDIS_HOST}
    port: ${SPRING_DATA_REDIS_PORT}
